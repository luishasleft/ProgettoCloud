version: '3.8'

services:
  webapp:
    build: ./webapp
    container_name: webapp
    volumes:
      - webapp_data:/usr/local/apache2/htdocs
    networks:
      - webnet

  db:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/mysql_root_password
      - MYSQL_DATABASE=esame
      - MYSQL_USER=studente
      - MYSQL_PASSWORD_FILE=/run/secrets/mysql_user_password
    secrets:
      - mysql_root_password
      - mysql_user_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    container_name: nginx
    depends_on:
      - webapp
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - webnet

volumes:
  webapp_data:
  db_data:

networks:
  webnet:

secrets:
  mysql_root_password:
    external: true
  mysql_user_password:
    external: true
