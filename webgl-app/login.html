<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login WebGL</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.3); }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { padding: 10px; width: 100%; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
        .error { color: red; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Accedi</button>
    <p id="error" class="error"></p>
</div>

<script>
    function login() {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        // Esempio semplice: username = "studente", password = "esame"
        if(user === "studente" && pass === "esame") {
            // accesso riuscito → vai alla scena WebGL
            window.location.href = "index.html";
        } else {
            document.getElementById("error").innerText = "Username o password errati!";
        }
    }
</script>
</body>
</html>
